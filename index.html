<!DOCTYPE html>
<html>

<head>
<title>AI Product Hunter</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
display:grid;
grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:8px;
}

button{
background:#22c55e;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

.trend{
color:#38bdf8;
font-weight:bold;
}

.margin{
color:#22c55e;
}

</style>

</head>


<body>

<h1>🚀 AI Product Hunter</h1>

<div class="container" id="products"></div>


<script>

fetch("products.json")
.then(res => res.json())
.then(products => {

let html=""
products.sort((a,b)=>b.trend-a.trend)
products.forEach(p => {

let margin = Math.round((p.amazon_price - p.supplier_price) / p.amazon_price * 100)

html += `

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p class="trend">Trend Score: ${p.trend}</p>

<p>Amazon Price: ₹${p.amazon_price}</p>

<p class="margin">Profit Margin: ${margin}%</p>

<a href="${p.amazon}" target="_blank">
<button>View Product</button>
</a>

</div>

`

})

document.getElementById("products").innerHTML = html

})

</script>

</body>
</html>
