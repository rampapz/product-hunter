<!DOCTYPE html>
<html>
<head>
<title>AI Product Hunter</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,250px);
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

img{
width:100%;
border-radius:6px;
}

button{
background:#22c55e;
border:none;
padding:8px;
color:white;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>🚀 AI Product Hunter</h1>

<div class="container">

<div class="card">
<img src="https://m.media-amazon.com/images/I/61W3X0+2ZLL._AC_SL1500_.jpg">

<h3>Portable Blender</h3>

<p>Trend Score: 94</p>

<a href="https://amazon.in" target="_blank">
<button>View Product</button>
</a>

</div>


<div class="card">
<img src="https://m.media-amazon.com/images/I/61g6k0Qk6UL._AC_SL1500_.jpg">

<h3>Magnetic Phone Mount</h3>

<p>Trend Score: 91</p>

<a href="https://amazon.in" target="_blank">
<button>View Product</button>
</a>

</div>

</div>

</body>
</html>
