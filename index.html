<!DOCTYPE html>
<html>

<head>
<title>AI Product Hunter</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.controls{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
}

input,select{
padding:8px;
border-radius:6px;
border:none;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,250px);
gap:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

img{
width:100%;
border-radius:6px;
}

button{
background:#22c55e;
border:none;
padding:8px;
color:white;
border-radius:5px;
cursor:pointer;
}

.trend{
color:#38bdf8;
font-weight:bold;
}

.margin{
color:#22c55e;
}

</style>

</head>


<body>

<h1>🚀 AI Product Hunter</h1>

<div class="controls">

<input id="search" placeholder="Search product...">

<select id="category">
<option value="all">All Categories</option>
<option value="gadgets">Gadgets</option>
<option value="home">Home</option>
<option value="fitness">Fitness</option>
</select>

</div>


<div class="container" id="products"></div>



<script>

const products = [

{
name:"Portable Blender",
category:"fitness",
trend:94,
amazon:"https://amazon.in",
image:"https://m.media-amazon.com/images/I/61W3X0+2ZLL._AC_SL1500_.jpg",
amazon_price:999,
supplier_price:220
},

{
name:"Magnetic Phone Mount",
category:"gadgets",
trend:91,
amazon:"https://amazon.in",
image:"https://m.media-amazon.com/images/I/61g6k0Qk6UL._AC_SL1500_.jpg",
amazon_price:399,
supplier_price:90
},

{
name:"Electric Spin Scrubber",
category:"home",
trend:93,
amazon:"https://amazon.in",
image:"https://m.media-amazon.com/images/I/61oXbM9pPPL._AC_SL1500_.jpg",
amazon_price:1499,
supplier_price:350
},

{
name:"LED Strip Lights",
category:"home",
trend:88,
amazon:"https://amazon.in",
image:"https://m.media-amazon.com/images/I/61y3yX9sBVL._AC_SL1500_.jpg",
amazon_price:699,
supplier_price:150
},

{
name:"Mini Projector",
category:"gadgets",
trend:90,
amazon:"https://amazon.in",
image:"https://m.media-amazon.com/images/I/61Xj3W5G8pL._AC_SL1500_.jpg",
amazon_price:4999,
supplier_price:1800
}

]



function renderProducts(list){

const container = document.getElementById("products")

container.innerHTML=""

list.forEach(p=>{

let margin = Math.round((p.amazon_price - p.supplier_price)/p.amazon_price*100)

container.innerHTML += `
<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<p class="trend">Trend Score: ${p.trend}</p>

<p>Price: ₹${p.amazon_price}</p>

<p class="margin">Profit Margin: ${margin}%</p>

<a href="${p.amazon}" target="_blank">
<button>View Product</button>
</a>

</div>
`

})

}



renderProducts(products)



document.getElementById("search").addEventListener("input",function(){

let term = this.value.toLowerCase()

let filtered = products.filter(p=>p.name.toLowerCase().includes(term))

renderProducts(filtered)

})



document.getElementById("category").addEventListener("change",function(){

let cat = this.value

if(cat==="all"){

renderProducts(products)

return

}

let filtered = products.filter(p=>p.category===cat)

renderProducts(filtered)

})

</script>

</body>
</html>
