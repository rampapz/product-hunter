<h1>🚀 AI Product Hunter</h1>
<div id="products"></div>

<script>
fetch("products.json")
.then(res=>res.json())
.then(data=>{

let html=""

data.forEach(p=>{
html+=`
<div>
<h3>${p.name}</h3>
<img src="${p.image}" width="200">
<p>Trend: ${p.trend}</p>
<a href="${p.amazon}">View Product</a>
</div>
`
})

document.getElementById("products").innerHTML=html

})
</script>
